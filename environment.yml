name: patagonia-energy

channels:
  - conda-forge

dependencies:
  - python=3.11

  # Core
  - numpy<2
  - pandas
  - scipy
  - statsmodels

  # Climate data
  - xarray
  - netcdf4
  - h5netcdf
  - cfgrib
  - dask
  - cdsapi

  # Geospatial
  - cartopy
  - geopandas
  - shapely
  - regionmask

  # Visualization
  - matplotlib
  - seaborn
  - plotly
  - folium

  # ML
  - scikit-learn
  - xgboost
  - shap

  # Deep learning (change the torch cu121 to either cpu or cu118 depending on if you have a nvidia gpu and what CUDA version)
  - pip
  - pip:
      - torch --index-url https://download.pytorch.org/whl/cu121

  # Jupyter
  - jupyterlab
  - ipywidgets
