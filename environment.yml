name: patagonia-energy

channels:
  - conda-forge

dependencies:
  - python=3.11

  # Core
  - numpy<2
  - pandas
  - scipy
  - statsmodels

  # Climate data
  - xarray
  - netcdf4
  - h5netcdf
  - cfgrib
  - dask
  - cdsapi

  # Geospatial
  - cartopy
  - geopandas
  - shapely
  - regionmask

  # Visualization
  - matplotlib
  - seaborn
  - plotly
  - folium

  # ML
  - scikit-learn
  - xgboost
  - shap

  # Deep learning
  - pip
  - pip:
      - tensorflow==2.15.0

  # Jupyter
  - jupyterlab
  - ipywidgets
